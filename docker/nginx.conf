server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Routing SPA (React Router : /fr, /en) — tout retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets fingerprintés (hash dans le nom) → cache long immuable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Modèles 3D, captures, polices → cache moyen
    location ~* \.(glb|gltf|jpg|jpeg|png|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # index.html jamais en cache (pour toujours récupérer les nouveaux hashes)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
