services:
  portfolio:
    build: .
    image: humanx-portfolio:latest
    container_name: humanx-portfolio
    restart: unless-stopped
    # Rejoint le réseau de Caddy (eventpics-net) → joignable par son nom
    # "humanx-portfolio:80" depuis le reverse proxy, comme tes autres apps.
    # Port 8088 publié seulement en local (debug : curl http://127.0.0.1:8088).
    ports:
      - "127.0.0.1:8088:80"
    networks:
      - caddy

networks:
  caddy:
    external: true
    name: eventpics-net
